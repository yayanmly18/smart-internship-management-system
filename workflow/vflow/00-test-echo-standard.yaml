version: "3.0"
metadata:
  id: kelompok1-test-echo-standard
  name: "Kelompok 1 - Echo Test (Standard Mode)"
  dialect: vflow

spec:
  activities:
    - id: trigger
      activity_type: Trigger
      trigger_config:
        trigger_type: webhook
        runtime_mode: standard
        webhook_config:
          path: /webhook/kelompok1/test/echo-standard
          method: POST
        response_framing: length_prefixed
        end_activity: respond
      output_variable: trigger_payload

    # 👇 Bikin response lewat Transform dulu
    - id: shape_response
      activity_type: Transform
      input_mappings:
        - target: response
          source:
            language: literal
            source: '{"status":"ok","message":"VFlow works standard!"}'
      output_variable: final_response

    # 👇 EndTrigger ambil dari variable final_response
    - id: respond
      activity_type: EndTrigger
      end_trigger_config:
        trigger_ref: trigger
        final_response:
          language: spv1
          source: "$.final_response"

  flows:
    - { id: f1, from: { node: trigger }, to: { node: shape_response } }
    - { id: f2, from: { node: shape_response }, to: { node: respond } }

  variables:
    - { name: trigger_payload, type: object }
    - { name: final_response, type: object }
