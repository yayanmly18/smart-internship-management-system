version: "3.0"
metadata:
  id: k1-echo-test
  name: "K1 - Echo Test"
  dialect: vflow
  tags: [k1, test]

spec:
  activities:
    - id: trigger
      activity_type: Trigger
      trigger_config:
        trigger_type: webhook
        runtime_mode: standard
        webhook_config:
          path: /webhook/k1/echo
          method: POST
        response_framing: length_prefixed
        end_activity: respond
      output_variable: trigger_payload

    - id: shape_response
      activity_type: Transform
      input_mappings:
        - target: response
          source:
            language: v-cel
            source: '{"status":"ok","source":"vflow","test":"k1-echo"}'
      output_variable: final_response

    - id: respond
      activity_type: EndTrigger
      end_trigger_config:
        trigger_ref: trigger
        final_response:
          language: spv1
          source: "$.final_response"

    - id: end
      activity_type: End

  flows:
    - { id: f1, from: { node: trigger }, to: { node: shape_response } }
    - { id: f2, from: { node: shape_response }, to: { node: respond } }
    - { id: f3, from: { node: respond }, to: { node: end } }

  variables:
    - { name: trigger_payload, type: object }
    - { name: final_response, type: object }
