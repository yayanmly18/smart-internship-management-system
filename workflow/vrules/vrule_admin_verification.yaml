rule_id: vrule_admin_verification

description: Verifikasi dokumen, data akademik, dan persyaratan administrasi oleh admin

condition:
  document_complete: "true"
  academic_data_valid: "true"
  administrative_requirements_met: "true"
  eligibility_status: "ELIGIBLE"

logic: AND

action:
  if_true: ADMIN_VERIFIED
  if_false: REJECTED

validation_rules:
  - field: document_complete
    type: boolean
    required: true
    description: Status kelengkapan dokumen (KRS, transkrip, surat pengantar, dll)
  
  - field: academic_data_valid
    type: boolean
    required: true
    description: Validitas data akademik mahasiswa
    
  - field: administrative_requirements_met
    type: boolean
    required: true
    description: Persyaratan administrasi terpenuhi (pembayaran, surat bebas tanggungan, dll)
  
  - field: eligibility_status
    type: string
    required: true
    allowed_values: [ELIGIBLE, NOT_ELIGIBLE]
    description: Status kelayakan dari Eligibility Assessment

rejection_reasons:
  - INCOMPLETE_DOCUMENT
  - INVALID_ACADEMIC_DATA
  - ADMINISTRATIVE_REQUIREMENTS_NOT_MET
  - NOT_ELIGIBLE