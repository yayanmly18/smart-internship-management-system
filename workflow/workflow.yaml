system:
  name: Smart Internship Management System

event_flow:
  start: InternshipSubmitted

workflows:

  # =========================
  # 1. REGISTRATION
  # =========================
  - id: wf_registration
    name: Internship Registration
    trigger: InternshipSubmitted

    steps:
      - validate_input
      - require_document_upload
      - upload_documents
      - validate_uploaded_files
      - generate_internship_id
      - save_to_database
      - audit_log (detach)

    output:
      status: REGISTERED
      next: EligibilityRequested

    on_incomplete:
      status: INCOMPLETE_DOCUMENT
      next: DocumentUploadRequired


  # =========================
  # 2. ELIGIBILITY CHECK
  # =========================
  - id: wf_eligibility
    name: Eligibility Assessment
    trigger: EligibilityRequested

    steps:
      - fetch_student_data
      - run_starlark_eligibility_score
      - apply_vrule_eligibility_check
      - save_result
      - audit_log (detach)

    output:
      status: ELIGIBILITY_DONE
      next: EligibilityCompleted


  # =========================
  # 3. ADMIN VERIFICATION
  # =========================
  - id: wf_admin_verification
    name: Admin Verification
    trigger: EligibilityCompleted

    steps:
      - fetch_uploaded_documents
      - review_documents
      - review_academic_data
      - review_administrative_requirements
      - run_starlark_admin_verification
      - apply_vrule_admin_verification
      - save_verification_result
      - audit_log (detach)
      - publish_event

    output:
      status: ADMIN_VERIFIED
      next: AdminVerificationCompleted

    on_reject:
      status: REJECTED
      next: AdminVerificationRejected

    on_revision_required:
      status: REVISION_REQUIRED
      next: DocumentRevisionRequested


  # =========================
  # 3.1 DOCUMENT REVISION
  # =========================
  - id: wf_document_revision
    name: Document Revision
    trigger: DocumentRevisionRequested

    steps:
      - notify_student_revision
      - wait_student_upload
      - validate_revised_documents
      - run_starlark_document_validation
      - apply_vrule_document_validation
      - save_revision_result
      - audit_log (detach)
      - publish_event

    output:
      status: REVISION_SUBMITTED
      next: EligibilityRequested

    on_revision_rejected:
      status: REJECTED
      next: AdminVerificationRejected


  # =========================
  # 4. SUPERVISOR APPROVAL
  # =========================
  - id: wf_supervisor_approval
    name: Supervisor Approval
    trigger: AdminVerificationCompleted

    steps:
      - send_approval_request
      - wait_supervisor_response
      - apply_vrule_supervisor_approval
      - save_decision
      - audit_log (detach)
      - publish_event

    output:
      status: APPROVED_OR_REJECTED
      next: SupervisorDecision

    on_reject:
      status: REJECTED
      next: SupervisorDecisionRejected


  # =========================
  # 4. COMPANY PLACEMENT
  # =========================
  - id: wf_placement
    name: Company Placement Engine
    trigger: SupervisorDecision

    steps:
      - fetch_company_list
      - run_starlark_matching
      - apply_vrule_company_matching
      - assign_company
      - publish_event

    output:
      status: COMPANY_ASSIGNED
      next: CompanyAssigned


  # =========================
  # 5. WEEKLY MONITORING
  # =========================
  - id: wf_monitoring
    name: Weekly Progress Monitoring
    trigger: ProgressSubmitted

    steps:
      - validate_report
      - apply_vrule_progress_compliance
      - save_progress
      - audit_log (detach)
      - publish_event

    output:
      status: PROGRESS_VALIDATED
      next: ProgressUpdated


  # =========================
  # 6. PERFORMANCE EVALUATION
  # =========================
  - id: wf_evaluation
    name: Performance Evaluation
    trigger: EvaluationRequested

    steps:
      - collect_all_data
      - run_starlark_grading
      - apply_vrule_performance_grading
      - save_result
      - publish_event

    output:
      status: EVALUATED
      next: EvaluationCompleted


  # =========================
  # 7. CERTIFICATION
  # =========================
  - id: wf_certification
    name: Certification & Completion
    trigger: EvaluationCompleted

    steps:
      - verify_final_score
      - apply_vrule_certificate_release
      - generate_certificate
      - save_certificate
      - audit_log (detach)
      - publish_event

    output:
      status: COMPLETED
      next: InternshipCompleted