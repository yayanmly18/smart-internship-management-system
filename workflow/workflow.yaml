version: "3.0"
metadata:
  id: smart-internship-system
  name: "Smart Internship Management System"
  description: |
    Pipeline ujung-ke-ujung untuk manajemen magang Kelompok 1.
    Meliputi pendaftaran, seleksi eligibilitas, approval spv,
    matching perusahaan, monitoring mingguan, evaluasi, hingga sertifikasi.

spec:
  activities:
    # ==========================================
    # PINTU MASUK UTAMA (TRIGGER FROM FRONTEND)
    # ==========================================
    # ==========================================
    # PINTU MASUK UTAMA (TRIGGER FROM FRONTEND)
    # ==========================================
    - id: status_trigger
      activity_type: Trigger
      trigger_config:
        trigger_type: webhook # ✅ GANTI DARI http JADI webhook
        webhook_config: # ✅ GANTI DARI http: JADI webhook_config:
          path: "/api/internship/submit"
          method: "POST"
      output_variable: trigger_payload

    # ==========================================
    # WORKFLOW 1: REGISTRATION AUDIT LOG
    # ==========================================
    - id: reg_log
      activity_type: Detach
      detach_config:
        url: "https://expand-dimensional-role-sum.trycloudflare.com/api/webhook/audit"
        method: "POST"
        payload:
          process: "Registration"
          status: "Success"

    # ==========================================
    # WORKFLOW 2: ELIGIBILITY ASSESSMENT
    # ==========================================
    - id: eligibility_star
      activity_type: Starlark
      starlark_config:
        file: "workflow/starlark/eligibility.star"
      output_variable: eligibility_res

    - id: eligibility_log
      activity_type: Detach
      detach_config:
        url: "https://expand-dimensional-role-sum.trycloudflare.com/api/webhook/audit"
        method: "POST"
        payload:
          process: "Eligibility Assessment"
          score: "{{ eligibility_res.score }}"

    # ==========================================
    # WORKFLOW 3: SUPERVISOR APPROVAL
    # ==========================================
    - id: approval_log
      activity_type: Detach
      detach_config:
        url: "https://expand-dimensional-role-sum.trycloudflare.com/api/webhook/audit"
        method: "POST"
        payload:
          process: "Supervisor Approval"
          action: "Approval Requested"

    # ==========================================
    # WORKFLOW 4: COMPANY PLACEMENT ENGINE
    # ==========================================
    - id: matching_star
      activity_type: Starlark
      starlark_config:
        file: "workflow/starlark/company_matching.star"
      output_variable: matching_res

    - id: placement_log
      activity_type: Detach
      detach_config:
        url: "https://expand-dimensional-role-sum.trycloudflare.com/api/webhook/audit"
        method: "POST"
        payload:
          process: "Company Placement"
          is_match: "{{ matching_res.is_match }}"
          match_score: "{{ matching_res.match_score }}"

    # ==========================================
    # WORKFLOW 5: WEEKLY MONITORING
    # ==========================================
    - id: monitoring_log
      activity_type: Detach
      detach_config:
        url: "https://expand-dimensional-role-sum.trycloudflare.com/api/webhook/audit"
        method: "POST"
        payload:
          process: "Weekly Monitoring"
          status: "Report Validated"

    # ==========================================
    # WORKFLOW 6: PERFORMANCE EVALUATION
    # ==========================================
    - id: grading_star
      activity_type: Starlark
      starlark_config:
        file: "workflow/starlark/performance_grading.star"
      output_variable: grading_res

    - id: evaluation_log
      activity_type: Detach
      detach_config:
        url: "https://expand-dimensional-role-sum.trycloudflare.com/api/webhook/audit"
        method: "POST"
        payload:
          process: "Performance Evaluation"
          final_score: "{{ grading_res.final_score }}"
          grade: "{{ grading_res.grade }}"

    # ==========================================
    # WORKFLOW 7: CERTIFICATION & COMPLETION
    # ==========================================
    - id: certification_log
      activity_type: Detach
      detach_config:
        url: "https://expand-dimensional-role-sum.trycloudflare.com/api/webhook/audit"
        method: "POST"
        payload:
          process: "Certification"
          status: "Certificate Generated"

    # ==========================================
    # PINTU KELUAR AKHIR (END NODE)
    # ==========================================
    - id: end
      activity_type: End

  # ==========================================
  # ALUR HUBUNGAN PANAH (DAG FLOW MAPPING)
  # ==========================================
  flows:
    - { id: f1, from: { node: status_trigger }, to: { node: reg_log } }
    - { id: f2, from: { node: reg_log }, to: { node: eligibility_star } }
    - {
        id: f3,
        from: { node: eligibility_star },
        to: { node: eligibility_log },
      }
    - { id: f4, from: { node: eligibility_log }, to: { node: approval_log } }
    - { id: f5, from: { node: approval_log }, to: { node: matching_star } }
    - { id: f6, from: { node: matching_star }, to: { node: placement_log } }
    - { id: f7, from: { node: placement_log }, to: { node: monitoring_log } }
    - { id: f8, from: { node: monitoring_log }, to: { node: grading_star } }
    - { id: f9, from: { node: grading_star }, to: { node: evaluation_log } }
    - {
        id: f10,
        from: { node: evaluation_log },
        to: { node: certification_log },
      }
    - { id: f11, from: { node: certification_log }, to: { node: end } }
